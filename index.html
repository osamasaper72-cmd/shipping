  function filterPending(){
    const box = document.getElementById('q');
    const q = box ? box.value.trim() : '';
    const list = document.getElementById('list');
    if(!list) return;
    const isMgr = (ROLE === 'admin' || ROLE === 'dispatcher');
    const base = isMgr ? PENDING.filter(function(x){ return !isFullyAssigned(x); }) : PENDING;
    if(!base.length){
      list.innerHTML = '<div class="center"><div class="empty-ill">📦</div><b>مفيش شحنات محتاجة إسناد</b>'+
        (isMgr?'الصق بيانات الوكيل في الشيت وارجع اعمل تحديث.':'هتظهر شحناتك أول ما تتسند ليك.')+'</div>';
      return;
    }
    // الأحدث فوق: بنرتب حسب وقت آخر تحديث (تعيين مندوب/عمولة) لو موجود،
    // ولو الشحنة لسه ماتلمستش خالص بترجع لترتيبها الطبيعي (وقت إضافتها).
    const ordered = sortByRecency(base);
    const filtered = !q ? ordered : ordered.filter(x => matchQ(x, q));
    list.innerHTML = filtered.length ? filtered.map(function(x,i){ return card(x, ROLE, ROLE === 'rep', i); }).join('')
      : '<div class="center"><div class="empty-ill">🔍</div><b>مفيش نتائج</b>جرّب كلمة بحث تانية.</div>';
  }

  function filterAssigned(){
    const box = document.getElementById('qa');
    const q = box ? box.value.trim() : '';
    const list = document.getElementById('assignedList');
    if(!list) return;
    const base = PENDING.filter(isFullyAssigned);
    if(!base.length){
      list.innerHTML = '<div class="center"><div class="empty-ill">🕐</div><b>لسه مفيش طلبات قيد التوصيل</b>اسند مندوب وحدّد عمولة لأي طلب من "قيد التنفيذ".</div>';
      return;
    }
    // الأحدث إسنادًا فوق
    const ordered = sortByRecency(base);
    const filtered = !q ? ordered : ordered.filter(x => matchQ(x, q));
    list.innerHTML = filtered.length ? filtered.map(function(x,i){ return card(x, ROLE, true, i); }).join('')
      : '<div class="center"><div class="empty-ill">🔍</div><b>مفيش نتائج</b></div>';
  }

  function filterDone(){
    const box = document.getElementById('q2');
    const q = box ? box.value.trim() : '';
    const list = document.getElementById('logList');
    if(!list) return;
    let items = DONE;
    if(STATUS_FILTER !== 'all') items = items.filter(x => x.status === STATUS_FILTER);
    if(q) items = items.filter(x => matchQ(x, q));
    list.innerHTML = items.length ? items.map(function(x,i){ return card(x, ROLE, true, i); }).join('')
      : '<div class="center"><div class="empty-ill">🔍</div><b>مفيش نتائج</b></div>';
  }

  function matchQ(x, q){
    return (x.code && x.code.toString().indexOf(q) > -1) ||
      (x.customer && x.customer.toString().indexOf(q) > -1) ||
      (x.phone && x.phone.toString().indexOf(q) > -1);
  }

  function genCodes(btn){
    btn.disabled = true; btn.textContent = 'جارِ التوليد…';
    callServer('generateAllCodes', [MY_ID, MY_PIN])
      .then(function(r){
        if(r.ok){ showToast('اتولّد '+r.added+' كود ✅', 'success'); load(); }
        else { showToast(r.error, 'error'); btn.disabled = false; btn.textContent = 'توليد أكواد لكل الشحنات الجديدة'; }
      })
      .catch(function(e){
        showToast('خطأ: '+e.message, 'error');
        btn.disabled = false; btn.textContent = 'توليد أكواد لكل الشحنات الجديدة';
      });
  }

  function genOne(btn, row){
    btn.disabled = true; btn.textContent = 'جارِ التوليد…';
    callServer('generateOneCode', [MY_ID, row, MY_PIN])
      .then(function(r){
        if(r.ok){
          showToast('الكود: '+r.code+' — '+(r.customer||'')+' — '+(r.phone||''), 'success');
          load();
        } else { showToast(r.error, 'error'); btn.disabled = false; btn.textContent = 'توليد كود'; }
      })
      .catch(function(e){
        showToast('خطأ: '+e.message, 'error');
        btn.disabled = false; btn.textContent = 'توليد كود';
      });
  }

  /* ===== طباعة اللابلات (أدمن/مسؤول توزيع) =====
     بتشتغل على الشحنات اللي ليها كود بالفعل داخل "قيد التنفيذ". بتفتح مودال
     اختيار (اللي لسه ما اتطبعش بيبقوا متعلّمين افتراضيًا)، وبعدين بتطبع لابل
     لكل شحنة متحددة (كود + QR + اسم الشركة + اسم العميل + الرقم + السعر)
     بمقاس 38×25 مم، وبعد الطباعة بتسجل الشحنات دي "اتطبعت" في الشيت. */
  function openPrintLabels(){
    const withCode = sortByRecency(PENDING.filter(function(x){ return x.code; }));
    if(!withCode.length){ showToast('مفيش شحنات لسه عليها كود', 'error'); return; }
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML =
      '<div class="modal-box printsel-box">'+
        '<p>اختار الشحنات اللي عايز تطبع لها لابل</p>'+
        '<input id="printSearch" class="search" placeholder="بحث بالاسم أو الموبايل أو الكود" oninput="filterPrintList()">'+
        '<div class="printsel-tools">'+
          '<button type="button" class="mini-btn" onclick="togglePrintAll(true)">تحديد الكل الظاهر</button>'+
          '<button type="button" class="mini-btn" onclick="togglePrintAll(false)">إلغاء التحديد</button>'+
        '</div>'+
        '<div class="printsel-list" id="printselList">'+ printListRows(withCode) +'</div>'+
        '<div class="modal-actions">'+
          '<button class="cancel" onclick="this.closest(\'.modal-overlay\').remove()">إلغاء</button>'+
          '<button class="confirm" onclick="doPrintSelected(this)">🖨️ طباعة المحدد</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(overlay);
  }

  function printListRows(items){
    if(!items.length) return '<div class="rep-status-row"><span>مفيش نتائج</span></div>';
    return items.map(function(x){
      return '<label class="printsel-row" data-name="'+esc((x.customer||'')).toLowerCase()+'" data-phone="'+esc(String(x.phone||''))+'" data-code="'+esc(String(x.code||''))+'">'+
        '<input type="checkbox" class="printsel-chk" data-row="'+x.row+'" '+(x.printed?'':'checked')+'>'+
        '<span class="printsel-name">'+esc(x.customer)+'</span>'+
        '<span class="printsel-code mono">'+esc(x.code)+'</span>'+
        (x.printed?'<span class="pill neutral">اتطبع قبل كده</span>':'')+
      '</label>';
    }).join('');
  }

  // البحث بيخفي/يظهر الصفوف بس، من غير ما يمسح اختيارات الشحنات التانية —
  // فتقدر تدور على دفعات مختلفة وتحدّدها بالتدريج قبل ما تطبع.
  function filterPrintList(){
    const q = (document.getElementById('printSearch').value || '').trim().toLowerCase();
    document.querySelectorAll('#printselList .printsel-row').forEach(function(row){
      const hay = (row.dataset.name||'')+' '+(row.dataset.phone||'')+' '+(row.dataset.code||'').toLowerCase();
      row.style.display = (!q || hay.indexOf(q) > -1) ? '' : 'none';
    });
  }

  function togglePrintAll(state){
    document.querySelectorAll('#printselList .printsel-row').forEach(function(row){
      if(row.style.display === 'none') return; // بيأثر على الظاهر بس
      const chk = row.querySelector('.printsel-chk');
      if(chk) chk.checked = state;
    });
  }

  function doPrintSelected(btn){
    const overlay = btn.closest('.modal-overlay');
    const checks = overlay.querySelectorAll('.printsel-chk:checked');
    if(!checks.length){ showToast('اختار شحنة واحدة على الأقل', 'error'); return; }
    const rows = Array.prototype.map.call(checks, function(c){ return Number(c.dataset.row); });
    const items = PENDING.filter(function(x){ return rows.indexOf(x.row) > -1; });
    overlay.remove();
    printLabels(items);
  }

  function printLabels(items){
    let area = document.getElementById('printArea');
    if(area) area.remove();
    area = document.createElement('div');
    area.id = 'printArea';
    document.body.appendChild(area);

    items.forEach(function(x){
      const label = document.createElement('div');
      label.className = 'print-label';
      // الأرقام: لو فيه أكتر من رقم (متفصولين بـ / أو , أو مسافة أو سطر) نعرضهم تحت بعض
      const phones = String(x.phone||'').split(/[\/،,\n]+/).map(function(p){ return p.trim(); }).filter(Boolean);
      const phonesHtml = phones.length ? phones.map(function(p){ return '<div class="pl-phone">'+esc(p)+'</div>'; }).join('') : '';
      label.innerHTML =
        '<div class="pl-top">'+
          '<span class="pl-code">#'+esc(x.code)+'</span>'+
          '<span class="pl-brand">'+esc(COMPANY_NAME)+'</span>'+
        '</div>'+
        '<div class="pl-body">'+
          '<div class="pl-qr" id="qr-'+x.row+'"></div>'+
          '<div class="pl-info">'+
            '<div class="pl-name">'+esc(x.customer)+'</div>'+
            '<div class="pl-price">'+esc(x.amount)+' ج</div>'+
            phonesHtml+
          '</div>'+
        '</div>';
      area.appendChild(label);
      try{
        if(window.QRCode){
          new QRCode(document.getElementById('qr-'+x.row), {
            text: String(x.code), width: 180, height: 180,
            correctLevel: QRCode.CorrectLevel.L
          });
        }
      }catch(e){}
    });

    const rows = items.map(function(x){ return x.row; });
    function afterPrint(){
      window.removeEventListener('afterprint', afterPrint);
      callServer('markPrinted', [MY_ID, rows, MY_PIN]).then(function(){ load(); }).catch(function(){});
      const a = document.getElementById('printArea');
      if(a) a.remove();
    }
    window.addEventListener('afterprint', afterPrint);
    // مهلة بسيطة تضمن رسم الـQR كامل جوه العناصر قبل ما نطلب الطباعة
    setTimeout(function(){ window.print(); }, 200);
  }

  /* ===== سكان QR بكاميرا الموبايل (بديل لسكانر الـUSB) =====
     بنستخدم مكتبة html5-qrcode: بتشغّل الكاميرا وتفكّ ترميز الـQR بقارئ
     النظام الأصلي (أندرويد) أو ZXing (آيفون) — أقوى وأثبت بكتير من jsQR.
     نفس المشغّل بيخدم وضعين: سكان لمرة واحدة (بحث)، وسكان مستمر (إسناد). */
  let qrScanner = null;

  const SCAN_ICON = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" '+
    'stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+
    '<path d="M7 4H5a1 1 0 0 0-1 1v2"/><path d="M17 4h2a1 1 0 0 1 1 1v2"/>'+
    '<path d="M7 20H5a1 1 0 0 1-1-1v-2"/><path d="M17 20h2a1 1 0 0 0 1-1v-2"/>'+
    '<line x1="4" y1="12" x2="20" y2="12"/></svg>';

  function buildScanOverlay(hintHtml, closeFn, manualFn){
    const overlay = document.createElement('div');
    overlay.className = 'scan-overlay';
    overlay.innerHTML =
      '<div class="scan-video-wrap"><div id="qrReader"></div>'+
        '<button class="scan-close" onclick="'+closeFn+'()">✕</button>'+
      '</div>'+
      '<div class="scan-hint" id="scanHint">'+hintHtml+'</div>'+
      '<div class="scan-manual">'+
        '<input id="scanManualInput" placeholder="أو اكتب الكود يدويًا" inputmode="numeric">'+
        '<button type="button" onclick="'+manualFn+'()">تأكيد</button>'+
      '</div>';
    document.body.appendChild(overlay);
    return overlay;
  }

  function startScanner(onDetect){
    if(!window.Html5Qrcode){
      showToast('مكتبة قراءة الأكواد لسه بتحمّل، استنى ثانية وجرّب تاني', 'error');
      return false;
    }
    try{
      qrScanner = new Html5Qrcode('qrReader', { verbose: false });
      qrScanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: function(w, h){ const m = Math.round(Math.min(w, h) * 0.7); return { width: m, height: m }; } },
        function(decodedText){ onDetect(String(decodedText)); },
        function(){ /* فشل قراءة فريم — عادي، بنتجاهله */ }
      ).catch(function(err){
        showToast('مش قادر أفتح الكاميرا: '+(err&&err.message||err||''), 'error');
        stopScanner();
      });
      return true;
    }catch(e){
      showToast('حصل خطأ في تشغيل الكاميرا', 'error');
      return false;
    }
  }

  function stopScanner(){
    const s = qrScanner; qrScanner = null;
    const p = (s && s.stop) ? s.stop().catch(function(){}) : Promise.resolve();
    p.then(function(){ try{ if(s && s.clear) s.clear(); }catch(e){} });
    const overlay = document.querySelector('.scan-overlay');
    if(overlay) overlay.remove();
  }

  /* --- سكان لمرة واحدة: بيحط الكود في خانة البحث ويشغّل الفلترة --- */
  function openCameraScan(inputId, filterFnName){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showToast('الكاميرا مش متاحة في المتصفح ده', 'error'); return;
    }
    SCAN_TARGET = { inputId: inputId, filterFnName: filterFnName };
    buildScanOverlay('وجّه الكاميرا على كود الطلب', 'closeCameraScan', 'submitManualScan');
    startScanner(function(code){ onScanSuccess(code, inputId, filterFnName); });
  }
  let SCAN_TARGET = null;

  function submitManualScan(){
    const inp = document.getElementById('scanManualInput');
    const code = inp ? inp.value.trim() : '';
    if(!code){ return; }
    if(SCAN_TARGET) onScanSuccess(code, SCAN_TARGET.inputId, SCAN_TARGET.filterFnName);
  }

  function onScanSuccess(code, inputId, filterFnName){
    if(navigator.vibrate){ try{ navigator.vibrate(50); }catch(e){} }
    closeCameraScan();
    const input = document.getElementById(inputId);
    if(input){
      input.value = code;
      if(typeof window[filterFnName] === 'function') window[filterFnName]();
    }
    showToast('اتلقط الكود ✅', 'success');
  }

  function closeCameraScan(){
    SCAN_TARGET = null;
    stopScanner();
  }

  /* ===== إسناد سريع بالسكان (للأدمن/مسؤول التوزيع) =====
     يختار مندوب مرة واحدة، وبعدين الكاميرا تفضل شغالة وكل ما تسكان كود
     طلب جديد بيتسند تلقائي للمندوب ده من غير ما تلمس الشاشة، لحد ما تدوس
     ✕. العمولة مش بتتحدد هنا — لو محتاجة تتظبط تقدر تعدّلها بعدين من
     كارت الطلب نفسه في "قيد التوصيل". */
  let scanAssignRepId = null, scanAssignRepName = '', scanAssignCount = 0;
  let scanAssignLastCode = '', scanAssignLastTime = 0;
  let scanAssignCommission = 0;
  let scanAssignBreakdown = {};

  function openScanAssign(){
    if(!REPS.length){ showToast('لسه مفيش مناديب مضافين', 'error'); return; }
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML =
      '<div class="modal-box printsel-box">'+
        '<p>اختار المندوب اللي هتسند له الطلبات بالسكان</p>'+
        '<div class="printsel-list">'+
          REPS.map(function(r){
            return '<button type="button" class="repPickBtn" onclick="chooseScanAssignRep(\''+
              esc(r.id).replace(/'/g,"\\'")+'\',\''+esc(r.name).replace(/'/g,"\\'")+'\')">'+esc(r.name)+'</button>';
          }).join('')+
        '</div>'+
        '<div class="modal-actions">'+
          '<button class="cancel" onclick="this.closest(\'.modal-overlay\').remove()">إلغاء</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(overlay);
  }

  /* بعد اختيار المندوب: بنطلب العمولة مرة واحدة تتطبق على كل الطلبات اللي
     هتتسكن. تقدر تغيّرها بعد كده وانت بتسكان لو حبيت. */
  function chooseScanAssignRep(repId, repName){
    const box = document.querySelector('.modal-overlay .modal-box');
    if(!box) return;
    box.className = 'modal-box';
    box.innerHTML =
      '<p>العمولة لـ '+esc(repName)+'</p>'+
      '<div class="addrep-field"><label>العمولة لكل طلب</label>'+
        '<input id="scanStartComm" type="number" inputmode="numeric" placeholder="0"></div>'+
      '<div class="scan-start-hint">هتتطبق على كل طلب هتسكانه — وتقدر تغيّرها في أي وقت وانت بتسكان</div>'+
      '<div class="modal-actions">'+
        '<button class="cancel" onclick="this.closest(\'.modal-overlay\').remove()">إلغاء</button>'+
        '<button class="confirm" onclick="startScanAssign(\''+esc(repId).replace(/'/g,"\\'")+'\',\''+esc(repName).replace(/'/g,"\\'")+'\')">ابدأ السكان ▶</button>'+
      '</div>';
    setTimeout(function(){ const i = document.getElementById('scanStartComm'); if(i) i.focus(); }, 60);
  }

  function startScanAssign(repId, repName){
    const commEl = document.getElementById('scanStartComm');
    const startComm = commEl ? (Number(commEl.value) || 0) : 0;
    document.querySelectorAll('.modal-overlay').forEach(function(o){ o.remove(); });
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showToast('الكاميرا مش متاحة في المتصفح ده', 'error'); return;
    }
    scanAssignRepId = repId; scanAssignRepName = repName; scanAssignCount = 0;
    scanAssignLastCode = ''; scanAssignLastTime = 0;
    scanAssignCommission = startComm; scanAssignBreakdown = {};

    const overlay = document.createElement('div');
    overlay.className = 'scan-overlay';
    overlay.innerHTML =
      '<div class="scan-topbar">'+
        '<div class="scan-topbar-rep">🛵 '+esc(repName)+'</div>'+
        '<div class="scan-topbar-comm"><label>العمولة</label>'+
          '<input id="scanLiveComm" type="number" inputmode="numeric" value="'+esc(startComm||'')+'" placeholder="0" oninput="updateScanCommission()"></div>'+
      '</div>'+
      '<div class="scan-video-wrap"><div id="qrReader"></div>'+
        '<button class="scan-close" onclick="closeScanAssign()">✕</button>'+
      '</div>'+
      '<div class="scan-hint" id="scanAssignHint">وجّه الكاميرا على كود الطلب — اتسند 0</div>'+
      '<div class="scan-manual">'+
        '<input id="scanManualInput" placeholder="أو اكتب الكود يدويًا" inputmode="numeric">'+
        '<button type="button" onclick="submitManualAssign()">تأكيد</button>'+
      '</div>';
    document.body.appendChild(overlay);

    startScanner(function(code){
      const now = Date.now();
      // منع تسجيل نفس الكود أكتر من مرة وهو لسه في نطاق الكاميرا
      if(code !== scanAssignLastCode || now - scanAssignLastTime > 2000){
        scanAssignLastCode = code; scanAssignLastTime = now;
        handleScanAssignHit(code);
      }
    });
  }

  function updateScanCommission(){
    const el = document.getElementById('scanLiveComm');
    scanAssignCommission = el ? (Number(el.value) || 0) : 0;
  }

  function submitManualAssign(){
    const inp = document.getElementById('scanManualInput');
    const code = inp ? inp.value.trim() : '';
    if(!code) return;
    inp.value = '';
    scanAssignLastCode = code; scanAssignLastTime = Date.now();
    handleScanAssignHit(code);
  }

  /* إسناد سريع: كل كود صحيح بيتسند فورًا بالعمولة الحالية، من غير توقف —
     عشان العملية تكون سريعة. وبنعدّ كل عمولة اتّسند بيها كام طلب للملخص. */
  function handleScanAssignHit(code){
    const hint = document.getElementById('scanAssignHint');
    const item = PENDING.find(function(x){ return String(x.code) === String(code); });
    if(!item){
      if(navigator.vibrate){ try{ navigator.vibrate([30,50,30]); }catch(e){} }
      if(hint) hint.textContent = '⚠️ الكود ده مش موجود — اتسند '+scanAssignCount;
      return;
    }
    if(String(item.repId) === String(scanAssignRepId)){
      if(hint) hint.textContent = 'الطلب ده اتسند قبل كده — اتسند '+scanAssignCount;
      return;
    }
    const comm = scanAssignCommission;
    // الإسناد ثم تسجيل العمولة مع بعض
    callServer('assignRep', [MY_ID, item.row, scanAssignRepId, MY_PIN]).then(function(res){
      if(!(res && res.ok)) throw new Error('assign-failed');
      return callServer('setCommission', [MY_ID, item.row, comm, MY_PIN]);
    }).then(function(){
      scanAssignCount++;
      scanAssignBreakdown[comm] = (scanAssignBreakdown[comm] || 0) + 1;
      item.repId = scanAssignRepId; item.repName = scanAssignRepName; item.commission = comm;
      if(navigator.vibrate){ try{ navigator.vibrate(40); }catch(e){} }
      if(hint) hint.textContent = '✅ '+item.customer+' — عمولة '+comm+' — اتسند '+scanAssignCount;
    }).catch(function(){
      if(hint) hint.textContent = '⚠️ حصل خطأ، جرّب تاني — اتسند '+scanAssignCount;
    });
  }

  function closeScanAssign(){
    stopScanner();
    const doneCount = scanAssignCount, doneName = scanAssignRepName;
    const breakdown = scanAssignBreakdown;
    scanAssignRepId = null; scanAssignRepName = ''; scanAssignCount = 0;
    scanAssignCommission = 0; scanAssignBreakdown = {};
    if(doneCount > 0){
      const parts = Object.keys(breakdown).map(function(c){ return breakdown[c]+' طلب بعمولة '+c+' ج'; });
      showScanAssignSummary(doneName, doneCount, parts);
    }
    load();
  }

  function showScanAssignSummary(repName, count, parts){
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML =
      '<div class="modal-box">'+
        '<div class="summary-emoji">✅</div>'+
        '<p>تم إسناد '+count+' طلب لـ '+esc(repName)+'</p>'+
        '<div class="summary-list">'+
          parts.map(function(p){ return '<div class="summary-row">'+esc(p)+'</div>'; }).join('')+
        '</div>'+
        '<div class="modal-actions">'+
          '<button class="confirm" onclick="this.closest(\'.modal-overlay\').remove()">تمام</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(overlay);
  }

  /* ===== دعم السكانر السلكي (زي Syble XB-6221) =====
     السكانر بيكتب الكود بسرعة كأنه كيبورد وبينهيه بـ Enter. المشكلة إن لو
     المؤشر مش واقف في خانة البحث، الكلام كان بيروح في الفراغ. هنا بنلتقط
     إدخال السكانر على مستوى الصفحة كلها (بنفرّقه عن الكتابة البشرية إنه
     بيجي سريع جدًا وبينتهي بـEnter)، وبنوجّهه حسب الشاشة المفتوحة:
     شاشة الإسناد → إسناد، خانة بحث → بحث. */
  function handleUsbScan(code){
    code = String(code || '').trim();
    if(!code) return;

    // شاشة الإسناد بالسكان مفتوحة؟ نتعامل معاه كإسناد لنفس المندوب
    if(scanAssignRepId){
      const now = Date.now();
      if(code !== scanAssignLastCode || now - scanAssignLastTime > 2000){
        scanAssignLastCode = code; scanAssignLastTime = now;
        handleScanAssignHit(code);
      }
      return;
    }
    // شاشة سكان كاميرا مفردة مفتوحة؟ نكمّل بنفس مسارها
    if(SCAN_TARGET){
      onScanSuccess(code, SCAN_TARGET.inputId, SCAN_TARGET.filterFnName);
      return;
    }
    // الوضع العادي: نحط الكود في خانة البحث الظاهرة ونشغّل الفلترة
    const qEl = document.getElementById('q');
    const q2El = document.getElementById('q2');
    const qaEl = document.getElementById('qa');
    const box = qEl || q2El || qaEl;
    if(box){
      box.value = code;
      if(qEl) filterPending(); else if(q2El) filterDone(); else if(qaEl) filterAssigned();
      try{ box.scrollIntoView({ block: 'center' }); }catch(e){}
    } else {
      showToast('اتلقط كود: '+code, 'success');
    }
  }

  (function initUsbScanner(){
    let buf = '', lastTime = 0;
    document.addEventListener('keydown', function(e){
      if(e.ctrlKey || e.altKey || e.metaKey) return;
      const now = Date.now();
      // فجوة أكبر من 60 مللي بين الحروف = إدخال بشري (مش سكانر)، نبدأ من جديد.
      // السكانر بيرمي الحروف بسرعة كبيرة (فرق مللي ثوانٍ قليلة بينها).
      if(now - lastTime > 60) buf = '';
      lastTime = now;

      if(e.key === 'Enter'){
        // بنعتبره سكان بس لو اتجمّع طول كافي بسرعة (كود الطلب مش قصير)
        if(buf.length >= 5){
          handleUsbScan(buf);
          e.preventDefault();
        }
        buf = '';
        return;
      }
      if(e.key && e.key.length === 1) buf += e.key;
    }, true);
  })();

  function actsBlock(row, adminOverride){
    const ov = adminOverride ? ',true' : '';
    return '<div class="acts">'+
      '<button class="go full" onclick="openDelivery(this,'+row+ov+')">✓ تم التسليم</button>'+
      '<button class="no" onclick="setStatus(this,'+row+',\'رفض و رفض\''+ov+')">رفض و رفض</button>'+
      '<button class="partial" onclick="setStatus(this,'+row+',\'رفض و دفع\''+ov+')">رفض و دفع</button>'+
      '<button class="dodge" onclick="setStatus(this,'+row+',\'تهرب\''+ov+')">تهرب</button>'+
      '<button class="neutral" onclick="setStatus(this,'+row+',\'لا يرد\''+ov+')">لا يرد</button>'+
      '<button class="cancel" onclick="setStatus(this,'+row+',\'لاغي\''+ov+')">لاغي</button>'+
      '<button class="wait full" onclick="setStatus(this,'+row+',\'تأجيل\''+ov+')">تأجيل</button>'+
    '</div>';
  }

  function revealOverride(btn, row){
    showConfirm('متأكد إنك عايز تغيّر الحالة بنفسك؟ ده هيتسجل إنه تغيير من الأدمن مش من المندوب.').then(function(ok){
      if(!ok) return;
      const wrap = document.getElementById('ovr-'+row);
      if(!wrap) return;
      wrap.innerHTML = actsBlock(row, true);
    });
  }

  function card(x, role, showActions, idx){
    const meta = STATUS_META[x.status] || {cls:'', label:'جديد'};
    const delayStyle = 'style="animation-delay:'+((idx||0)*35)+'ms"';
    const codeBlock = x.code
      ? '<span class="code mono">'+esc(x.code)+'</span>'
      : ((role==='admin' || role==='dispatcher')
          ? '<button class="genone" onclick="genOne(this,'+x.row+')">توليد كود</button>'
          : '<span class="code empty mono">— بدون كود —</span>');

    let h = '<div class="card s-'+meta.cls+'" '+delayStyle+'>'+
      '<div class="top">'+codeBlock+'<span class="pill '+meta.cls+'">'+meta.label+'</span></div>'+
      '<div class="nameRow"><span class="name">'+esc(x.customer)+'</span></div>';

    if(x.phone){
      h += '<div class="contactRow">'+
        '<span class="phoneNum">'+esc(x.phone)+'</span>'+
        '<a class="cbtn call" href="tel:'+esc(x.phone)+'">'+ICON_CALL+' اتصال</a>'+
        '<a class="cbtn wa" href="'+waLink(x.phone)+'" target="_blank">'+ICON_WA+' واتساب</a>'+
        '<a class="cbtn sms" href="'+smsLink(x.phone)+'">'+ICON_SMS+' SMS</a>'+
        '<button class="cbtn copy" onclick="copyText(\''+esc(x.phone)+'\',this)">'+ICON_COPY+'</button>'+
      '</div>';
    }

    h += '<div class="meta">'+
      (x.address?'📍 '+esc(x.address)+'<br>':'')+
      '<span class="amt">💰 '+esc(x.amount)+' ج</span></div>';

    if(role==='admin' || role==='dispatcher'){
      let opts = '<option value="">— اختار مندوب —</option>';
      REPS.forEach(r => opts += '<option value="'+esc(r.id)+'"'+
        (r.id===x.repId?' selected':'')+'>'+esc(r.name)+'</option>');
      h += '<div class="assign"><label>المندوب:</label>'+
        '<select id="rep-'+x.row+'">'+opts+'</select></div>';
      h += '<div class="commRow"><label>العمولة:</label>'+
        '<input type="number" id="comm-'+x.row+'" value="'+esc(x.commission||'')+'" placeholder="0"></div>';
      h += '<div class="assignActs">'+
        '<button class="assign-btn" onclick="confirmAssign(this,'+x.row+')">✓ '+(x.repId?'تحديث الإسناد':'تأكيد الإسناد')+'</button>'+
        (x.repId ? '<button class="unassign-btn" onclick="unassignOrder(this,'+x.row+')">إلغاء الإسناد</button>' : '')+
        '</div>';
    } else if(x.repName){
      h += '<div class="meta">🛵 '+esc(x.repName)+'</div>';
    }

    if(showActions){
      if(role === 'admin'){
        h += '<div class="override-wrap" id="ovr-'+x.row+'">'+
          '<button class="override-btn" onclick="revealOverride(this,'+x.row+')">⚠️ تحديث الحالة يدويًا (طوارئ)</button>'+
        '</div>';
      } else if(role === 'rep'){
        h += actsBlock(x.row, false);
      }
      // مسؤول التوزيع: من غير تحكم في حالة التسليم عمدًا
    }

    h += '</div>';
    return h;
  }

  /* ===== إسناد الطلب: زرار واحد بيجمع المندوب + العمولة مع بعض =====
     الطلب مش بيتحرك لتبويب "قيد التوصيل" غير لما الاتنين يتسجلوا مع بعض
     (isFullyAssigned)، فمفيش داعي لحفظ تلقائي منفصل لكل حقل. */
  function confirmAssign(btn, row){
    const repSel = document.getElementById('rep-'+row);
    const commInput = document.getElementById('comm-'+row);
    const repId = repSel ? repSel.value : '';
    const comm = commInput ? commInput.value : '';
    if(!repId){ showToast('اختار مندوب الأول', 'error'); return; }
    if(!comm || Number(comm) <= 0){ showToast('اكتب قيمة العمولة', 'error'); return; }

    const originalText = btn.textContent;
    btn.disabled = true; btn.textContent = 'جارِ الإسناد…';
    callServer('assignRep', [MY_ID, row, repId, MY_PIN])
      .then(function(r){
        if(!r.ok){ showToast(r.error, 'error'); btn.disabled = false; btn.textContent = originalText; return null; }
        return callServer('setCommission', [MY_ID, row, comm, MY_PIN]);
      })
      .then(function(r2){
        if(!r2) return; // فشل في الخطوة اللي فاتت، الرسالة بالفعل ظهرت
        if(r2.ok){ showToast('تم إسناد الطلب ✅', 'success'); load(); }
        else { showToast(r2.error, 'error'); btn.disabled = false; btn.textContent = originalText; }
      })
      .catch(function(e){
        showToast('خطأ: '+e.message, 'error');
        btn.disabled = false; btn.textContent = originalText;
      });
  }

  function unassignOrder(btn, row){
    showConfirm('متأكد إنك عايز تلغي إسناد المندوب؟ الطلب هيرجع لقائمة "قيد التنفيذ".').then(function(ok){
      if(!ok) return;
      btn.disabled = true;
      callServer('assignRep', [MY_ID, row, '', MY_PIN])
        .then(function(r){
          if(r.ok){ showToast('اتلغى الإسناد', 'success'); load(); }
          else { showToast(r.error, 'error'); btn.disabled = false; }
        })
        .catch(function(e){ showToast('خطأ: '+e.message, 'error'); btn.disabled = false; });
    });
  }

  function setStatus(btn, row, status, adminOverride){
    let reason = '', paidAmt = null;
    if(status === 'رفض و دفع'){
      const val = prompt('اكتب مصاريف الشحن اللي العميل دفعها (رقم بس):');
      if(val === null) return;
      paidAmt = Number(val) || 0;
    } else if(status === 'تسليم جزئي'){
      const val = prompt('اكتب المبلغ اللي العميل دفعه فعليًا (رقم بس):');
      if(val === null) return;
      paidAmt = Number(val) || 0;
    } else if(status !== 'تم التسليم'){
      const val = prompt('ملاحظة (اختياري):');
      if(val === null) return; // كانسل = رجوع كامل، من غير أي تسجيل حالة
      reason = val || '';
    }
    if(adminOverride){ reason = '[تغيير من الأدمن] ' + reason; }
    if(navigator.vibrate){ try{ navigator.vibrate(30); }catch(e){} }
    const cardEl = btn.closest('.card');
    const allBtns = cardEl ? cardEl.querySelectorAll('button') : [btn];
    allBtns.forEach(function(b){ b.disabled = true; });
    callServer('updateStatus', [MY_ID, row, status, reason, paidAmt, MY_PIN])
      .then(function(r){
        if(r.ok){
          showStatusConfirm(status);
          // حركة اختفاء الكارت قبل إعادة التحميل
          if(cardEl && (MAIN_TAB === 'pending' || MAIN_TAB === 'assigned')){ cardEl.classList.add('removing'); }
          setTimeout(function(){ load(); }, 450);
        }
        else { showToast(r.error, 'error'); allBtns.forEach(function(b){ b.disabled = false; }); }
      })
      .catch(function(e){
        showToast('خطأ: '+e.message, 'error');
        allBtns.forEach(function(b){ b.disabled = false; });
      });
  }

  /* ===== Pull to refresh ===== */
  (function setupPullToRefresh(){
    let startY = 0, pulling = false, ptrEl = null;
    const THRESHOLD = 70;
    function getPtr(){
      if(!ptrEl){
        ptrEl = document.createElement('div');
        ptrEl.className = 'ptr';
        ptrEl.textContent = '↻';
        document.body.appendChild(ptrEl);
      }
      return ptrEl;
    }
    document.addEventListener('touchstart', function(e){
      if(window.scrollY === 0 && MY_ID){ startY = e.touches[0].clientY; pulling = true; }
    }, {passive:true});
    document.addEventListener('touchmove', function(e){
      if(!pulling) return;
      const dy = e.touches[0].clientY - startY;
      if(dy > 0){
        const h = Math.min(dy * 0.5, 80);
        getPtr().style.height = h + 'px';
      }
    }, {passive:true});
    document.addEventListener('touchend', function(e){
      if(!pulling) return;
      pulling = false;
      const ptr = getPtr();
      const h = parseInt(ptr.style.height || '0', 10);
      if(h >= THRESHOLD){
        ptr.classList.add('spin');
        silentRefresh();
        setTimeout(function(){ ptr.classList.remove('spin'); ptr.style.height = '0px'; }, 800);
      } else {
        ptr.style.height = '0px';
      }
    }, {passive:true});
  })();

  /* ===== بانر انقطاع الإنترنت ===== */
  (function setupOfflineBanner(){
    const banner = document.getElementById('offlineBanner');
    if(!banner) return;
    function update(){
      if(navigator.onLine){
        banner.classList.remove('show');
      } else {
        banner.classList.add('show');
      }
    }
    window.addEventListener('online', function(){
      update();
      showToast('🌐 النت رجع، بنحدّث البيانات', 'success');
      if(MY_ID) silentRefresh();
    });
    window.addEventListener('offline', update);
    update();
  })();

  init();
</script>
