<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الشحن</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%9A%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
<!-- توليد QR للابلات الطباعة (مع مصادر احتياطية) -->
<script>
  // بيحمّل السكربت من أكتر من مصدر ورا بعض: لو مصدر محجوب أو بطيء
  // بينتقل للي بعده تلقائي — ده بيحل مشكلة "المكتبة مش بتتحمّل" على الشبكات
  // اللي بتحجب بعض الـ CDNs.
  function loadScriptFallback(srcs, cb){
    var i = 0;
    (function tryNext(){
      if(i >= srcs.length){ if(cb) cb(false); return; }
      var s = document.createElement('script');
      s.src = srcs[i++];
      s.onload = function(){ if(cb) cb(true); };
      s.onerror = tryNext;
      document.head.appendChild(s);
    })();
  }
  loadScriptFallback([
    'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js',
    'https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js'
  ]);
  // قراءة QR من كاميرا الموبايل — مكتبة قوية (قارئ النظام الأصلي على أندرويد،
  // وZXing على الآيفون) بدل jsQR الضعيفة.
  loadScriptFallback([
    'https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js',
    'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js'
  ]);
</script>
<style>
  :root{
    --bg:#0f1620; --card:#18222f; --line:#26323f; --ink:#eef3f8; --mut:#8aa0b4;
    --go:#2dd4a7; --no:#ff6b6b; --wait:#ffb454; --partial:#5b9bd5; --dodge:#c084fc;
    --neutral:#94a3b8; --cancel:#f97316;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:'Tajawal',system-ui,sans-serif; padding:14px 14px 40px}
  h1{font-size:19px; font-weight:800; margin:4px 0 2px}
  .sub{color:var(--mut); font-size:13px; margin-bottom:14px}
  .mono{font-family:'IBM Plex Mono',monospace; letter-spacing:.5px}

  .stats2{display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:8px}
  .stat{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:10px 6px; text-align:center}
  .stat b{display:block; font-size:20px; font-weight:800; line-height:1.1}
  .stat span{font-size:11px; color:var(--mut)}

  .money3{display:grid; grid-template-columns:repeat(3,1fr); gap:6px;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 8px; margin-bottom:14px; text-align:center}
  .money3 div span{display:block; font-size:11px; color:var(--mut); margin-bottom:4px}
  .money3 div b{font-size:16px; font-weight:800}
  .money3 .c1 b{color:var(--go)} .money3 .c2 b{color:var(--wait)} .money3 .c3 b{color:#5bc8ff}

  .gen{width:100%; border:0; border-radius:12px; padding:14px; font-family:inherit;
    font-size:15px; font-weight:700; margin-bottom:12px; color:#06241c; background:var(--go)}
  .gen:disabled{opacity:.6}
  .gen .badge{background:#06241c22; padding:2px 8px; border-radius:20px; margin-inline-start:8px; font-size:13px}

  .search{width:100%; background:var(--card); border:1px solid var(--line); color:var(--ink);
    border-radius:12px; padding:13px 14px; font-family:inherit; font-size:15px; margin-bottom:12px}
  .search::placeholder{color:var(--mut)}

  .tabs{display:flex; gap:8px; margin-bottom:14px}
  .tab{flex:1; text-align:center; padding:11px 4px; border-radius:12px; border:1px solid var(--line);
    background:var(--card); color:var(--mut); font-family:inherit; font-weight:700; font-size:14px}
  .tab.active{background:var(--go); color:#06241c; border-color:var(--go)}

  select.filter{width:100%; background:var(--card); border:1px solid var(--line); color:var(--ink);
    border-radius:12px; padding:12px; font-family:inherit; font-size:14px; margin-bottom:12px}

  .bal-card{background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px 16px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center}
  .bal-info b{display:block; font-size:16px; margin-bottom:3px}
  .bal-info span{font-size:13px; color:var(--mut)}
  .bal-info .amt{color:var(--go); font-weight:800; font-size:18px; display:block; margin-top:4px}
  .close-btn{border:0; border-radius:10px; padding:11px 16px; font-family:inherit;
    font-weight:700; font-size:13px; color:#06241c; background:var(--go); white-space:nowrap}

  .genone{border:1px dashed var(--go); background:#16352b; color:var(--go);
    border-radius:9px; padding:6px 12px; font-family:inherit; font-weight:700; font-size:13px}

  .card{position:relative; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:14px 14px 14px 16px; margin-bottom:12px; overflow:hidden}
  .card::before{content:''; position:absolute; top:0; right:0; bottom:0; width:5px; background:var(--partial)}
  .card.s-go::before{background:var(--go)} .card.s-no::before{background:var(--no)}
  .card.s-wait::before{background:var(--wait)} .card.s-partial::before{background:var(--partial)}
  .card.s-dodge::before{background:var(--dodge)} .card.s-neutral::before{background:var(--neutral)}
  .card.s-cancel::before{background:var(--cancel)}

  .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
  .code{font-size:14px; color:var(--go)} .code.empty{color:var(--mut)}
  .pill{font-size:11px; font-weight:700; padding:4px 9px; border-radius:20px; background:#223; color:var(--mut)}
  .pill.go{background:#16352b; color:var(--go)} .pill.no{background:#3a1f1f; color:var(--no)}
  .pill.wait{background:#3a301a; color:var(--wait)} .pill.partial{background:#14283a; color:var(--partial)}
  .pill.dodge{background:#2a1f3a; color:var(--dodge)} .pill.neutral{background:#22282f; color:var(--neutral)}
  .pill.cancel{background:#3a2414; color:var(--cancel)}

  .nameRow{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px}
  .name{font-size:16px; font-weight:700}
  .phoneRow{display:flex; align-items:center; gap:8px; margin-bottom:6px}
  .phoneNum{font-weight:800; font-size:15px; color:var(--ink); font-family:'IBM Plex Mono',monospace}
  .phoneBtn{display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px;
    border-radius:50%; text-decoration:none; font-size:15px}
  .phoneBtn.call{background:#16352b} .phoneBtn.wa{background:#123a2e}

  .meta{font-size:13px; color:var(--mut); line-height:1.7}
  .amt{color:var(--ink); font-weight:700}

  .assign{display:flex; align-items:center; gap:8px; margin-top:10px}
  .assign label{font-size:12px; color:var(--mut); white-space:nowrap}
  select{flex:1; background:var(--bg); border:1px solid var(--line); color:var(--ink);
    border-radius:10px; padding:9px; font-family:inherit; font-size:14px}

  .commRow{display:flex; align-items:center; gap:8px; margin-top:8px}
  .commRow label{font-size:12px; color:var(--mut); white-space:nowrap}
  .commRow input{flex:1; background:var(--bg); border:1px solid var(--line); color:var(--ink);
    border-radius:10px; padding:9px; font-family:inherit; font-size:14px}

  .acts{display:grid; grid-template-columns:repeat(2,1fr); gap:7px; margin-top:10px}
  .acts button{border:1px solid var(--line); background:var(--bg); color:var(--ink);
    border-radius:10px; padding:10px 4px; font-family:inherit; font-weight:700; font-size:13px}
  .acts .full{grid-column:1 / -1}
  .acts .go{border-color:#234a40; color:var(--go)}
  .acts .no{border-color:#4a2323; color:var(--no)}
  .acts .wait{border-color:#4a3c1f; color:var(--wait)}
  .acts .partial{border-color:#1f3a52; color:var(--partial)}
  .acts .dodge{border-color:#3a2a52; color:var(--dodge)}
  .acts .neutral{border-color:#33404d; color:var(--neutral)}
  .acts .cancel{border-color:#52341f; color:var(--cancel)}

  .center{text-align:center; color:var(--mut); padding:50px 20px}
  .center b{display:block; color:var(--ink); font-size:17px; margin-bottom:6px}

  .login-box{max-width:360px; margin:60px auto; text-align:center}
  .login-box h1{font-size:20px; margin-bottom:8px}
  .login-box p{color:var(--mut); font-size:13px; margin-bottom:20px; line-height:1.7}
  .login-box input{width:100%; background:var(--card); border:1px solid var(--line); color:var(--ink);
    border-radius:12px; padding:14px; font-family:inherit; font-size:16px; text-align:center;
    margin-bottom:12px; letter-spacing:1px}
  .login-box button{width:100%; border:0; border-radius:12px; padding:14px; font-family:inherit;
    font-size:15px; font-weight:700; color:#06241c; background:var(--go)}
  .login-box .err{color:var(--no); font-size:13px; margin-top:10px; min-height:18px}
  .switch-link{display:block; text-align:center; color:var(--mut); font-size:12px;
    margin-top:14px; text-decoration:underline}

  /* Toast notifications */
  .toast-wrap{position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    z-index:9999; display:flex; flex-direction:column; gap:8px; align-items:center;
    pointer-events:none; width:100%; padding:0 16px}
  .toast{background:var(--card); border:1px solid var(--line); color:var(--ink);
    padding:12px 18px; border-radius:12px; font-size:14px; font-weight:700;
    box-shadow:0 6px 24px rgba(0,0,0,.4); max-width:340px; text-align:center;
    opacity:0; transform:translateY(12px); transition:opacity .25s, transform .25s;
    white-space:pre-line}
  .toast.show{opacity:1; transform:translateY(0)}
  .toast.success{border-color:#234a40; color:var(--go)}
  .toast.error{border-color:#4a2323; color:var(--no)}

  /* Confirm modal */
  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:9998;
    display:flex; align-items:center; justify-content:center; padding:20px}
  .modal-box{background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:22px 20px; max-width:340px; width:100%; text-align:center}
  .modal-box p{font-size:15px; line-height:1.7; margin:0 0 18px; white-space:pre-line; color:var(--ink)}
  .modal-actions{display:flex; gap:8px}
  .modal-actions button{flex:1; border:0; border-radius:10px; padding:12px;
    font-family:inherit; font-weight:700; font-size:14px}
  .modal-actions .confirm{background:var(--go); color:#06241c}
  .modal-actions .cancel{background:var(--bg); border:1px solid var(--line); color:var(--ink)}

  /* Status confirmation full-screen overlay */
  .status-overlay{position:fixed; inset:0; background:rgba(15,22,32,.94); z-index:10000;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    opacity:0; transition:opacity .25s}
  .status-overlay.show{opacity:1}
  .status-circle{width:96px; height:96px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:44px; transform:scale(.4);
    transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
  .status-overlay.show .status-circle{transform:scale(1)}
  .status-circle.s-go{background:#16352b; color:var(--go); box-shadow:0 0 0 10px #16352b66}
  .status-circle.s-no{background:#3a1f1f; color:var(--no); box-shadow:0 0 0 10px #3a1f1f66}
  .status-circle.s-partial{background:#14283a; color:var(--partial); box-shadow:0 0 0 10px #14283a66}
  .status-circle.s-dodge{background:#2a1f3a; color:var(--dodge); box-shadow:0 0 0 10px #2a1f3a66}
  .status-circle.s-neutral{background:#22282f; color:var(--neutral); box-shadow:0 0 0 10px #22282f66}
  .status-circle.s-cancel{background:#3a2414; color:var(--cancel); box-shadow:0 0 0 10px #3a241466}
  .status-circle.s-wait{background:#3a301a; color:var(--wait); box-shadow:0 0 0 10px #3a301a66}
  .status-title{font-size:19px; font-weight:800; color:var(--ink); opacity:0;
    transform:translateY(6px); transition:opacity .3s .1s, transform .3s .1s}
  .status-overlay.show .status-title{opacity:1; transform:translateY(0)}

  /* Tab content + card entrance motion */
  @keyframes tabIn{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)}}
  #list, #logList, #doneList, #repsList{animation:tabIn .3s ease}
  @keyframes swipeInFwd{from{opacity:0; transform:translateX(24px)} to{opacity:1; transform:translateX(0)}}
  @keyframes swipeInBack{from{opacity:0; transform:translateX(-24px)} to{opacity:1; transform:translateX(0)}}
  .swipe-fwd{animation:swipeInFwd .28s ease both !important}
  .swipe-back{animation:swipeInBack .28s ease both !important}
  @keyframes cardIn{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)}}
  .card{animation:cardIn .35s ease both}
  .tab{transition:background .2s, color .2s, border-color .2s}

  /* Admin reps overview */
  .rep-card{background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px 16px; margin-bottom:10px; cursor:pointer}
  .add-rep-btn{display:block; width:100%; padding:13px; margin-bottom:12px; border-radius:12px;
    border:1px dashed var(--go); background:transparent; color:var(--go);
    font-family:inherit; font-size:14px; font-weight:800}
  .add-rep-btn:active{background:var(--card)}
  .addrep-field{text-align:right; margin-bottom:12px}
  .addrep-field label{display:block; font-size:12px; color:var(--mut); font-weight:700; margin-bottom:6px}
  .addrep-field input{width:100%; height:46px; border-radius:12px; border:1px solid var(--line);
    background:var(--bg); color:var(--ink); padding:0 12px; font-family:inherit; font-size:14px;
    text-align:right; box-sizing:border-box}
  .rep-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
  .rep-head b{font-size:16px}
  .rep-total{font-size:12px; color:var(--mut); background:var(--bg); border:1px solid var(--line);
    border-radius:20px; padding:3px 10px; white-space:nowrap}
  .rep-money{display:flex; gap:14px; font-size:12px; color:var(--mut); flex-wrap:wrap}
  .rep-money b{color:var(--ink); font-size:13px; margin-inline-start:3px}
  .rep-money .net b{color:var(--go)}
  .rep-details{margin-top:12px; padding-top:12px; border-top:1px solid var(--line); animation:tabIn .25s ease}
  .rep-status-row{display:flex; justify-content:space-between; font-size:13px; padding:5px 0; color:var(--mut)}
  .rep-status-row b{color:var(--ink)}

  /* لون التسليم الجزئي */
  :root{ --partdel:#38bdf8; }
  .card.s-partdel::before{background:var(--partdel)}
  .pill.partdel{background:#0e2a3a; color:var(--partdel)}
  .acts .partdel{border-color:#1f4a5e; color:var(--partdel)}
  .status-circle.s-partdel{background:#0e2a3a; color:var(--partdel); box-shadow:0 0 0 10px #0e2a3a66}

  /* صف الرقم + أزرار الاتصال الكبيرة */
  .contactRow{display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap}
  .contactRow .phoneNum{font-weight:800; font-size:16px; font-family:'IBM Plex Mono',monospace;
    color:var(--ink); flex:1; min-width:110px}
  .cbtn{display:inline-flex; align-items:center; justify-content:center; gap:5px;
    height:40px; padding:0 14px; border-radius:11px; text-decoration:none; font-family:inherit;
    font-weight:700; font-size:13px; border:0; cursor:pointer}
  .cbtn svg{width:18px; height:18px; display:block}
  .cbtn.call{background:#16352b; color:var(--go)}
  .cbtn.wa{background:#0b3d2e; color:#25d366}
  .cbtn.sms{background:#1a2b3d; color:#5b9bd5}
  .cbtn.copy{background:var(--bg); color:var(--mut); border:1px solid var(--line)}

  /* حركة اختفاء الكارت لما تتحدد حالته */
  @keyframes cardOut{
    from{opacity:1; transform:translateX(0); max-height:600px}
    to{opacity:0; transform:translateX(-40px); max-height:0; margin:0; padding-top:0; padding-bottom:0}
  }
  .card.removing{animation:cardOut .45s ease forwards; overflow:hidden}

  /* Pull to refresh */
  .ptr{position:fixed; top:0; left:0; right:0; display:flex; align-items:center; justify-content:center;
    height:0; overflow:hidden; color:var(--go); font-size:22px; z-index:50; transition:height .15s}
  .ptr.spin{animation:ptrSpin .8s linear infinite}
  @keyframes ptrSpin{to{transform:rotate(360deg)}}

  /* Empty states */
  .empty-ill{font-size:52px; margin-bottom:12px; opacity:.85}

  /* Delivery choice sheet */
  .choice-overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:9998;
    display:flex; align-items:flex-end; justify-content:center}
  .choice-sheet{background:var(--card); border-top-left-radius:20px; border-top-right-radius:20px;
    border:1px solid var(--line); padding:20px 18px 26px; width:100%; max-width:440px;
    animation:sheetUp .3s cubic-bezier(.34,1.2,.64,1)}
  @keyframes sheetUp{from{transform:translateY(100%)} to{transform:translateY(0)}}
  .choice-sheet h3{margin:0 0 4px; font-size:17px; text-align:center}
  .choice-sheet p{margin:0 0 16px; font-size:13px; color:var(--mut); text-align:center}
  .choice-btn{width:100%; border:0; border-radius:12px; padding:15px; font-family:inherit;
    font-weight:700; font-size:15px; margin-bottom:10px; cursor:pointer; display:flex;
    align-items:center; justify-content:center; gap:8px}
  .choice-btn.full{background:var(--go); color:#06241c}
  .choice-btn.part{background:#0e2a3a; color:var(--partdel); border:1px solid #1f4a5e}
  .choice-btn.cancel{background:var(--bg); color:var(--mut); border:1px solid var(--line); font-weight:600}

  /* Day counter */
  .day-counter{background:linear-gradient(135deg, #16352b, #14283a); border:1px solid var(--line);
    border-radius:14px; padding:12px 16px; margin-bottom:14px; display:flex; align-items:center;
    justify-content:space-between}
  .day-counter .dc-text{font-size:14px; font-weight:700}
  .day-counter .dc-text span{color:var(--go)}
  .day-counter .dc-emoji{font-size:22px}

  /* زرارات تأكيد/إلغاء الإسناد */
  .assignActs{display:flex; gap:8px; margin-top:10px}
  .assign-btn{flex:1; border:0; border-radius:10px; padding:11px; font-family:inherit;
    font-weight:700; font-size:13px; background:var(--go); color:#06241c}
  .assign-btn:disabled{opacity:.6}
  .unassign-btn{border:1px solid #4a2323; background:var(--bg); color:var(--no);
    border-radius:10px; padding:11px 14px; font-family:inherit; font-weight:700; font-size:13px}

  /* زرار تحديث الحالة يدويًا (طوارئ) للأدمن */
  .override-wrap{margin-top:10px}
  .override-btn{width:100%; border:1px dashed #52341f; background:#2a1f14; color:var(--wait);
    border-radius:10px; padding:11px; font-family:inherit; font-weight:700; font-size:13px}

  /* شاشة تحميل بطابع الشحن */
  .loading-scene{display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:70px 20px; color:var(--mut)}
  .loading-road{position:relative; width:120px; height:34px; margin-bottom:14px; overflow:hidden}
  .loading-truck{font-size:32px; position:absolute; top:0; left:50%; margin-left:-16px;
    animation:truckBounce 1.2s ease-in-out infinite}
  @keyframes truckBounce{0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)}}
  .loading-dashes{position:absolute; bottom:4px; left:0; right:0; height:3px; border-radius:2px;
    background:repeating-linear-gradient(90deg, var(--line) 0 10px, transparent 10px 20px);
    animation:dashMove .5s linear infinite}
  @keyframes dashMove{from{background-position:0 0} to{background-position:-20px 0}}
  .loading-scene b{font-size:14px; color:var(--ink); font-weight:700}

  /* بانر انقطاع الإنترنت */
  .offline-banner{position:fixed; top:0; left:0; right:0; background:var(--no); color:#2a0a0a;
    text-align:center; font-size:13px; font-weight:800; padding:10px; z-index:10001;
    transform:translateY(-100%); transition:transform .3s ease}
  .offline-banner.show{transform:translateY(0)}

  /* صف البحث + زرار سكان الكاميرا */
  .searchRow{display:flex; gap:8px; margin-bottom:12px}
  .searchRow .search{margin-bottom:0}
  .scanBtn{flex-shrink:0; width:48px; height:48px; border-radius:12px; border:1px solid var(--line);

<body>
  <div id="app"><div class="loading-scene"><div class="loading-road"><div class="loading-dashes"></div><div class="loading-truck">🚚</div></div><b>جارِ التحميل…</b></div></div>
  <div id="offlineBanner" class="offline-banner">📡 مفيش اتصال بالإنترنت — بنحاول نرجعلك أول ما النت يرجع</div>

<script>
  /* ============================================================
     مهم جدًا: غيّر السطر ده لرابط الـ Apps Script بتاعك المنشور
     (اللي بينتهي بـ /exec). خده من:
     Deploy > Manage deployments > انسخ رابط الـ Web app
  ============================================================ */
  const API_URL = 'https://script.google.com/macros/s/AKfycbxhXE0bzdqCxuIep9BEt7kMtYxYp7p7Ehs0Fn70it9jpHy_93krqQnZFHMhigp-4mkh/exec';

  /* لما تقرر اسم الشركة النهائي، غيّره من هنا بس — بيتستخدم في رسائل الواتساب/SMS وعلى اللابل */
  const COMPANY_NAME = 'Beheira Express';

  const STORAGE_KEY = 'shipsys_uid';
  const STORAGE_KEY_PIN = 'shipsys_pin';
  let REPS = [], PENDING = [], DONE = [], BALANCES = [];
  let ROLE = '', MY_ID = '', MY_PIN = '', MAIN_TAB = 'pending', SUB_TAB = 'log', STATUS_FILTER = 'all';

  const app = document.getElementById('app');
  const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function loadingScene(text){
    return '<div class="loading-scene"><div class="loading-road"><div class="loading-dashes"></div>'+
      '<div class="loading-truck">🚚</div></div><b>'+esc(text)+'</b></div>';
  }

  const STATUS_META = {
    'تم التسليم':   {cls:'go',      label:'✓ تم التسليم'},
    'تسليم جزئي':   {cls:'partdel', label:'◐ تسليم جزئي'},
    'رفض و رفض':    {cls:'no',      label:'✕ رفض'},
    'رفض و دفع':    {cls:'partial', label:'💸 رفض ودفع'},
    'تهرب':         {cls:'dodge',   label:'🏃 تهرب'},
    'لا يرد':       {cls:'neutral', label:'🔇 لا يرد'},
    'لاغي':         {cls:'cancel',  label:'🚫 لاغي'},
    'تأجيل':        {cls:'wait',    label:'⏳ تأجيل'}
  };

  /* ===== نداء الـ API =====
     بنبعت GET للـ Apps Script مع fn و args في الرابط.
     redirect:'follow' بيخلي المتصفح يتبع الـ 302 اللي Apps Script
     بيعمله لحد ما يوصل للـ JSON النهائي.

     وقت انتظار أقصى (timeout) 8 ثواني لكل محاولة: fetch() مفيهوش
     وقت انتظار افتراضي، فلو الطلب بطيء جدًا (مش فاشل، بس بطيء) كان
     ممكن يستنى للأبد. لو الوقت خلص، نعتبره فشل ونحاول تاني (لحد 3 مرات)
     بدل ما نفضل واقفين على "جاري التحميل" من غير أي رد. */
  function callServer(fn, args, attempt){
    attempt = attempt || 1;
    const url = API_URL + '?fn=' + encodeURIComponent(fn) +
      '&args=' + encodeURIComponent(JSON.stringify(args || [])) +
      '&_cb=' + Date.now() + Math.random().toString(36).slice(2);

    const controller = new AbortController();
    const timeoutId = setTimeout(function(){ controller.abort(); }, 8000);

    return fetch(url, { method: 'GET', redirect: 'follow', cache: 'no-store', signal: controller.signal })
      .then(function(res){
        clearTimeout(timeoutId);
        if(!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .catch(function(err){
        clearTimeout(timeoutId);
        if(attempt < 3){
          const delay = attempt * 500;
          return new Promise(function(resolve){
            setTimeout(function(){ resolve(callServer(fn, args, attempt + 1)); }, delay);
          });
        }
        throw err;
      });
  }

  /* ===== toast و confirm بدل alert/confirm الافتراضية ===== */
  function showToast(message, type){
    type = type || 'success';
    let wrap = document.getElementById('toastWrap');
    if(!wrap){
      wrap = document.createElement('div');
      wrap.id = 'toastWrap';
      wrap.className = 'toast-wrap';
      document.body.appendChild(wrap);
    }
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = message;
    wrap.appendChild(t);
    requestAnimationFrame(function(){ t.classList.add('show'); });
    setTimeout(function(){
      t.classList.remove('show');
      setTimeout(function(){ t.remove(); }, 300);
    }, 2800);
  }

  function showConfirm(message){
    return new Promise(function(resolve){
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML =
        '<div class="modal-box">'+
          '<p>'+esc(message)+'</p>'+
          '<div class="modal-actions">'+
            '<button class="cancel">إلغاء</button>'+
            '<button class="confirm">تأكيد</button>'+
          '</div>'+
        '</div>';
      document.body.appendChild(overlay);
      overlay.querySelector('.cancel').onclick = function(){ overlay.remove(); resolve(false); };
      overlay.querySelector('.confirm').onclick = function(){ overlay.remove(); resolve(true); };
    });
  }

  /* ===== شاشة تأكيد مخصصة لكل حالة، بالإضافة لاهتزاز خفيف لو الجهاز بيدعمه ===== */
  const STATUS_CONFIRM = {
    'تم التسليم':   {color:'go',      icon:'✓',  title:'تم التسليم بنجاح',              vibrate:[40,40,40]},
    'تسليم جزئي':   {color:'partdel', icon:'◐',  title:'تم تسجيل تسليم جزئي',           vibrate:[40,40,40]},
    'رفض و رفض':    {color:'no',      icon:'✕',  title:'تم تسجيل رفض الطلب',            vibrate:[80]},
    'رفض و دفع':    {color:'partial', icon:'💸', title:'تم تسجيل الرفض مع تحصيل مصاريف', vibrate:[40,40,40]},
    'تهرب':         {color:'dodge',   icon:'🏃', title:'تم تسجيل حالة تهرب',            vibrate:[80]},
    'لا يرد':       {color:'neutral', icon:'🔇', title:'تم تسجيل: لا يرد',              vibrate:[40]},
    'لاغي':         {color:'cancel',  icon:'🚫', title:'تم إلغاء الطلب',                vibrate:[80]},
    'تأجيل':        {color:'wait',    icon:'⏳', title:'تم تأجيل الطلب',                vibrate:[40]}
  };

  function showStatusConfirm(status){
    const meta = STATUS_CONFIRM[status];
    if(!meta) return;
    if(navigator.vibrate){ try{ navigator.vibrate(meta.vibrate); }catch(e){} }
    const overlay = document.createElement('div');
    overlay.className = 'status-overlay';
    overlay.innerHTML =
      '<div class="status-circle s-'+meta.color+'"><span>'+meta.icon+'</span></div>'+
      '<div class="status-title">'+esc(meta.title)+'</div>';
    document.body.appendChild(overlay);
    requestAnimationFrame(function(){ overlay.classList.add('show'); });
    setTimeout(function(){
      overlay.classList.remove('show');
      setTimeout(function(){ overlay.remove(); }, 300);
    }, 1300);
  }

  /* ===== ريفرش تلقائي كل 15 ثانية، بس لما التاب ظاهر، وبهدوء (silent) =====
     بيتوقف تمامًا لو التاب مخفي أو المستخدم بيكتب في حقل إدخال، عشان
     ما نوقفوش عليه شغله أو نستهلك quota من غير داعي. */
  let pollTimer = null;
  let lastPendingRows = [];
  let SIG = { pending: '', done: '' };
  let deliveredSeen = null; // null = لسه ما اتهيّأش (أول تحميل مش بيطلّع إشعارات)

  // بيجمّع الطلبات اللي حالتها تسليم (كامل/جزئي) في map: row → بياناتها
  function collectDelivered(doneArr){
    const m = {};
    (doneArr || []).forEach(function(x){
      if(x.status === 'تم التسليم' || x.status === 'تسليم جزئي'){
        m[x.row] = { customer: x.customer, rep: x.repName, status: x.status };
      }
    });
    return m;
  }

  function sigOf(items){
    return (items||[]).map(function(x){
      return [x.row,x.status,x.repId,x.commission,x.code,x.printed?1:0,x.customer,x.phone,x.amount,x.paidAmt].join('~');
    }).join('|');
  }

  function startPolling(){
    stopPolling();
    pollTimer = setInterval(silentRefresh, 15000);
  }
  function stopPolling(){
    if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
  }

  /* بنعتبر إن فيه "إجراء شغّال" (مودال مفتوح، أو زرار متعطّل لحد ما يرد
     السيرفر) ومنأجّلش تحديث القايمة عشان منقطعوش على المستخدم لحظة ما هو
     بيعمل حاجة — البيانات لسه بتتحدّث في الخلفية، بس هيظهر في الدورة الجاية. */
  function isSafeToRerenderList(){
    if(document.querySelector('.modal-overlay, .choice-overlay, .status-overlay, .scan-overlay')) return false;
    const body = document.getElementById('mainBody');
    if(body && body.querySelector('button:disabled')) return false;
    return true;
  }

  function captureRepDetailsState(){
    const open = {};
    document.querySelectorAll('.rep-details').forEach(function(d){
      if(!d.hidden){
        const sel = d.querySelector('select.filter');
        open[d.dataset.repid] = sel ? sel.value : 'all';
      }
    });
    return open;
  }
  function restoreRepDetailsState(open){
    Object.keys(open).forEach(function(repId){
      const d = document.querySelector('.rep-details[data-repid="'+repId.replace(/"/g,'')+'"]');
      if(!d) return;
      d.hidden = false;
      const sel = d.querySelector('select.filter');
      if(sel) sel.value = open[repId];
      renderRepShipmentsFor(d, open[repId]);
    });
  }

  /* بتحدّث أرقام الملخص العلوي (الإحصائيات + التحصيل/العمولة/الصافي + عدّاد
     اليوم + أرقام التبويبات) بلمسة مباشرة للعناصر، من غير ما تمس أي حاجة
     تانية في الصفحة — ده اللي بيمنع "التقطيع" اللي كان بيحصل من إعادة رسم
     الصفحة كلها كل 15 ثانية. */
  function patchHeaderNumbers(d){
    const s = d.stats;
    const elP = document.getElementById('statPending'); if(elP) elP.textContent = s.pendingCount;
    const elD = document.getElementById('statDone'); if(elD) elD.textContent = s.doneCount;
    const elC = document.getElementById('statCollected'); if(elC) elC.textContent = s.collected+' ج';
    const elM = document.getElementById('statCommission'); if(elM) elM.textContent = s.commission+' ج';
    const elN = document.getElementById('statNet'); if(elN) elN.textContent = s.net+' ج';

    if(d.role==='rep'){
      const total = s.pendingCount + s.doneCount;
      const dc = document.getElementById('dayCounter');
      if(dc && total>0){
        const emoji = s.pendingCount === 0 ? '🎉' : '🚚';
        const msg = s.pendingCount === 0 ? 'خلّصت كل شحناتك! 👏' :
          'خلّصت <span>'+s.doneCount+'</span> من '+total+' — فاضل '+s.pendingCount;
        const txt = dc.querySelector('.dc-text'); if(txt) txt.innerHTML = msg;
        const em = dc.querySelector('.dc-emoji'); if(em) em.textContent = emoji;
      }
    }

    const isMgr = (d.role==='admin' || d.role==='dispatcher');
    const unassignedCount = isMgr ? (d.pending||[]).filter(function(x){return !isFullyAssigned(x);}).length : 0;
    const assignedCount = isMgr ? (d.pending||[]).filter(isFullyAssigned).length : 0;
    const bar = document.getElementById('mainTabsBar');
    if(bar){
      const pendBtn = bar.querySelector('[data-tab="pending"]');
      if(pendBtn) pendBtn.textContent = 'قيد التنفيذ'+(isMgr && unassignedCount ? ' ('+unassignedCount+')':'');
      const asgBtn = bar.querySelector('[data-tab="assigned"]');
      if(asgBtn) asgBtn.textContent = 'قيد التوصيل'+(assignedCount ? ' ('+assignedCount+')':'');
    }
  }

  function silentRefresh(){
    if(!MY_ID || document.hidden) return;
    const activeEl = document.activeElement;
    const isTyping = activeEl && (activeEl.tagName==='INPUT' || activeEl.tagName==='SELECT') &&
      activeEl.id !== 'q' && activeEl.id !== 'q2' && activeEl.id !== 'qa';
    if(isTyping) return;

    callServer('getMyData', [MY_ID, MY_PIN]).then(function(r){
      if(!r.ok) return;
      if(ROLE === 'rep'){
        const newRows = (r.pending||[]).map(function(x){ return x.row; });
        const added = newRows.filter(function(rw){ return lastPendingRows.indexOf(rw) === -1; });
        if(lastPendingRows.length && added.length){
          showToast('🚚 عندك '+added.length+' شحنة جديدة', 'success');
          if(navigator.vibrate){ try{ navigator.vibrate(60); }catch(e){} }
        }
      }

      REPS = r.reps || []; PENDING = r.pending || []; DONE = r.done || []; BALANCES = r.balances || [];
      lastPendingRows = (r.pending||[]).map(function(x){ return x.row; });
      patchHeaderNumbers(r);

      // إشعار للأدمن/مسؤول التوزيع أول ما مندوب يسلّم طلب (بيشتغل والتطبيق مفتوح).
      // بنحسبه هنا قبل أي early-return عشان الإشعار يوصل حتى لو القايمة
      // متغيّرتش على الشاشة.
      if(ROLE === 'admin' || ROLE === 'dispatcher'){
        const nowDelivered = collectDelivered(DONE);
        if(deliveredSeen){
          Object.keys(nowDelivered).forEach(function(row){
            if(!deliveredSeen[row]){
              const d = nowDelivered[row];
              const verb = d.status === 'تسليم جزئي' ? 'سلّم جزئيًا' : 'سلّم';
              showToast('🎉 '+(d.rep || 'مندوب')+' '+verb+' طلب '+(d.customer || ''), 'success');
              if(navigator.vibrate){ try{ navigator.vibrate(80); }catch(e){} }
            }
          });
        }
        deliveredSeen = nowDelivered;
      }

      const newPendingSig = sigOf(r.pending);
      const newDoneSig = sigOf(r.done);
      const pendingChanged = newPendingSig !== SIG.pending;
      const doneChanged = newDoneSig !== SIG.done;
      SIG.pending = newPendingSig; SIG.done = newDoneSig;

      // لو البيانات اللي بتظهر في التاب الحالي متغيّرتش خالص عن آخر مرة،
      // منلمسش الـDOM أصلًا — ده اللي بيلغي "التقطيع" في الحالة الطبيعية
      // (أغلب دورات الـ15 ثانية مفيهاش أي تغيير جديد).
      const relevantChanged =
        (MAIN_TAB === 'pending' || MAIN_TAB === 'assigned') ? pendingChanged :
        (MAIN_TAB === 'reps') ? (pendingChanged || doneChanged) :
        (ROLE !== 'admin' && ROLE !== 'dispatcher') ? doneChanged :
        (SUB_TAB === 'collect') ? (pendingChanged || doneChanged) : doneChanged;
      if(!relevantChanged) return;

      // فيه إجراء شغّال (مودال مفتوح أو نداء لسه ما رجعش)؟ منأجّلش تحديث
      // القايمة الدورة دي عشان منقطعوش عليه؛ الأرقام فوق اتحدّثت خلاص.
      if(!isSafeToRerenderList()) return;

      const scrollY = window.scrollY;
      const repState = MAIN_TAB === 'reps' ? captureRepDetailsState() : null;

      if(MAIN_TAB === 'pending') filterPending();
      else if(MAIN_TAB === 'assigned') filterAssigned();
      else if(MAIN_TAB === 'reps'){
        renderRepsTab(document.getElementById('repsList'));
        if(repState) restoreRepDetailsState(repState);
      } else if(ROLE !== 'admin' && ROLE !== 'dispatcher'){
        const list = document.getElementById('doneList');
        if(list){
          list.innerHTML = DONE.length ? DONE.map(function(x,i){ return card(x, ROLE, false, i); }).join('') :
            '<div class="center"><div class="empty-ill">✅</div><b>لسه مفيش حاجة منفّذة</b>هتظهر هنا أول ما تحدّد حالة أي شحنة.</div>';
        }
      } else if(SUB_TAB === 'collect'){
        const sb = document.getElementById('subBody'); if(sb) renderBalances(sb);
      } else {
        filterDone();
      }

      requestAnimationFrame(function(){ window.scrollTo(0, scrollY); });
    }).catch(function(){ /* أخطاء الريفرش الصامت متتجاهلش عشان متزعجش المستخدم */ });
  }

  document.addEventListener('visibilitychange', function(){
    if(document.hidden) stopPolling();
    else if(MY_ID){ silentRefresh(); startPolling(); }

    if (saved) { MY_ID = saved; MY_PIN = localStorage.getItem(STORAGE_KEY_PIN) || ''; load(); }

    app.innerHTML =
      '<div class="login-box">'+
        '<h1>نظام الشحن</h1>'+
        '<p>أدخل الـ ID بتاعك مرة واحدة بس، والسيستم هيفتكره بعد كده.<br>'+

  function tryLogin(){
    const val = document.getElementById('idInput').value.trim();
    const pin = document.getElementById('pinInput').value.trim();
    if(!val){ showLogin('اكتب الرقم الأول'); return; }
    app.innerHTML = loadingScene('جارِ التحقق…');
    callServer('getMyData', [val, pin])
      .then(function(r){
        if(r.ok){
          try{ localStorage.setItem(STORAGE_KEY, val); localStorage.setItem(STORAGE_KEY_PIN, pin); }catch(e){}
          MY_ID = val; MY_PIN = pin;
          render(r);
          lastPendingRows = (r.pending||[]).map(function(x){ return x.row; });
          SIG.pending = sigOf(r.pending); SIG.done = sigOf(r.done);
          deliveredSeen = (r.role==='admin'||r.role==='dispatcher') ? collectDelivered(r.done) : null;
          startPolling();
        } else { showLogin(r.error || 'الرقم مش موجود في السيستم'); }
      })
      .catch(function(e){ showLogin('خطأ: '+e.message); });
  }

  function switchAccount(){
    try{ localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(STORAGE_KEY_PIN); }catch(e){}
    MY_ID = ''; MY_PIN = '';
    stopPolling();
    showLogin();
  }

  function load(){
    callServer('getMyData', [MY_ID, MY_PIN])
      .then(function(r){
        if(r.ok){
          render(r);
          lastPendingRows = (r.pending||[]).map(function(x){ return x.row; });
          SIG.pending = sigOf(r.pending); SIG.done = sigOf(r.done);
          if(deliveredSeen === null && (r.role==='admin'||r.role==='dispatcher')) deliveredSeen = collectDelivered(r.done);
          startPolling();
        }
        else { try{localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(STORAGE_KEY_PIN);}catch(e){} stopPolling(); showLogin(r.error); }
      })
      .catch(function(e){
        app.innerHTML = '<div class="center"><b>خطأ في الاتصال</b>'+esc(e.message)+'</div>';
      });
  }

  /* فتح اختيار نوع التسليم: كامل أو جزئي */

  function render(d){
    REPS = d.reps || []; PENDING = d.pending || []; DONE = d.done || []; BALANCES = d.balances || [];
    ROLE = d.role;

    const isMgr = (d.role==='admin' || d.role==='dispatcher');
    const subtitle = d.role==='admin' ? 'حساب الأدمن — تحكم كامل' :
      d.role==='dispatcher' ? 'حساب مسؤول التوزيع' : 'حساب مندوب — شحناتك';
    let html = '<h1>أهلاً '+esc(d.name)+' 👋</h1>'+
      '<div class="sub">'+subtitle+'</div>';

    const s = d.stats;
    html += '<div class="stats2">'+
      stat(s.pendingCount,'قيد التنفيذ','statPending')+stat(s.doneCount,'منفّذ','statDone')+'</div>';

    // عدّاد اليوم للمندوب: كام خلّص من إجمالي شحناته
    if(d.role==='rep'){
      const total = s.pendingCount + s.doneCount;
      if(total > 0){
        const emoji = s.pendingCount === 0 ? '🎉' : '🚚';
        const msg = s.pendingCount === 0 ? 'خلّصت كل شحناتك! 👏' :
          'خلّصت <span>'+s.doneCount+'</span> من '+total+' — فاضل '+s.pendingCount;
        html += '<div class="day-counter" id="dayCounter"><div class="dc-text">'+msg+'</div><div class="dc-emoji">'+emoji+'</div></div>';
      }
    }

    html += '<div class="money3">'+
      '<div class="c1"><span>التحصيل</span><b id="statCollected">'+s.collected+' ج</b></div>'+
      '<div class="c2"><span>العمولة</span><b id="statCommission">'+s.commission+' ج</b></div>'+
      '<div class="c3"><span>الصافي</span><b id="statNet">'+s.net+' ج</b></div>'+
      '</div>';

    const tab1Label = 'قيد التنفيذ';
    const tab2Label = isMgr ? 'تم التنفيذ' : 'تم التسليم';
    const unassignedCount = isMgr ? PENDING.filter(function(x){return !isFullyAssigned(x);}).length : 0;
    const assignedCount = isMgr ? PENDING.filter(isFullyAssigned).length : 0;
    html += '<div class="tabs" id="mainTabsBar">'+
      '<button class="tab '+(MAIN_TAB==='pending'?'active':'')+'" data-tab="pending" onclick="switchMain(\'pending\')">'+tab1Label+(isMgr && unassignedCount ? ' ('+unassignedCount+')':'')+'</button>'+
      (isMgr ? '<button class="tab '+(MAIN_TAB==='assigned'?'active':'')+'" data-tab="assigned" onclick="switchMain(\'assigned\')">قيد التوصيل'+(assignedCount ? ' ('+assignedCount+')':'')+'</button>' : '')+
      '<button class="tab '+(MAIN_TAB==='done'?'active':'')+'" data-tab="done" onclick="switchMain(\'done\')">'+tab2Label+'</button>'+
      (isMgr ? '<button class="tab '+(MAIN_TAB==='reps'?'active':'')+'" data-tab="reps" onclick="switchMain(\'reps\')">المناديب</button>' : '')+
      '</div>';

    if(isMgr && MAIN_TAB==='pending' && s.noCode>0){
      html += '<button class="gen" onclick="genCodes(this)">'+
        'توليد أكواد لكل الشحنات الجديدة<span class="badge">'+s.noCode+' من غير كود</span></button>';
    }
    if(isMgr && MAIN_TAB==='pending'){
      const withCode = PENDING.filter(function(x){ return x.code; });
      const unprinted = withCode.filter(function(x){ return !x.printed; }).length;
      if(withCode.length){
        html += '<button class="gen printbtn" onclick="openPrintLabels()">'+
          '🖨️ طباعة اللابلات'+(unprinted?'<span class="badge">'+unprinted+' لسه ما اتطبعوش</span>':'')+'</button>';
      }
      if(REPS.length){
        html += '<button class="gen scanassignbtn" onclick="openScanAssign()">'+SCAN_ICON+' إسناد سريع بالسكان</button>';
      }
    }

    html += '<div id="mainBody"></div>'+
      '<a class="switch-link" onclick="switchAccount()">تسجيل خروج / تغيير الحساب</a>';

    app.innerHTML = html;
    renderMainBody();
  }

  function stat(n, label, id){
    return '<div class="stat"><b'+(id?' id="'+id+'"':'')+'>'+n+'</b><span>'+label+'</span></div>';
  }

  /* الطلب يُعتبر "متسند بالكامل" (وبالتالي ينتقل لـ"قيد التوصيل") لما
     يكون له مندوب محدد وعمولة أكبر من صفر مع بعض، مش أي واحدة لوحدها. */
  function isFullyAssigned(x){
    return !!x.repId && Number(x.commission) > 0;
  }

  /* ترتيب بالأحدث لمسًا (updated) فوق، ولو اتنين نفس الوقت أو ماتلمسوش
     خالص بيفضلوا على ترتيبهم الأصلي (الـ sort مستقر في المتصفحات الحديثة). */
  function sortByRecency(arr){
    return arr.slice().sort(function(a, b){
      const ta = a.updated ? new Date(a.updated).getTime() : 0;
      const tb = b.updated ? new Date(b.updated).getTime() : 0;
      return tb - ta;
    });
  }

  function tabOrder(){
    return (ROLE==='admin' || ROLE==='dispatcher') ? ['pending','assigned','done','reps'] : ['pending','done'];
  }

  function switchMain(tab){
    if(tab === MAIN_TAB) return;
    const order = tabOrder();
    const dir = order.indexOf(tab) > order.indexOf(MAIN_TAB) ? 1 : -1;
    MAIN_TAB = tab;
    const bar = document.getElementById('mainTabsBar');
    if(bar){
      bar.querySelectorAll('.tab').forEach(function(btn){
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
    }
    renderMainBody(dir);
  }

  function switchSub(tab){
    if(tab === SUB_TAB) return;
    const order = ['log','collect'];
    const dir = order.indexOf(tab) > order.indexOf(SUB_TAB) ? 1 : -1;
    SUB_TAB = tab;
    renderMainBody(dir);
  }

  function renderMainBody(dir){
    const body = document.getElementById('mainBody');
    if(!body) return;
    const animClass = dir === 1 ? 'swipe-fwd' : dir === -1 ? 'swipe-back' : '';

    const isMgr = (ROLE === 'admin' || ROLE === 'dispatcher');

    if(MAIN_TAB === 'pending'){
      body.innerHTML =
        '<div class="searchRow"><input id="q" class="search" placeholder="بحث بالاسم أو الموبايل أو الكود" oninput="filterPending()">'+
        '<button type="button" class="scanBtn" onclick="openCameraScan(\'q\',\'filterPending\')">'+SCAN_ICON+'</button></div>'+
        '<div id="list" class="'+animClass+'"></div>';
      filterPending();
      return;
    }

    if(MAIN_TAB === 'assigned' && isMgr){
      body.innerHTML =
        '<div class="searchRow"><input id="qa" class="search" placeholder="بحث بالاسم أو الموبايل أو الكود" oninput="filterAssigned()">'+
        '<button type="button" class="scanBtn" onclick="openCameraScan(\'qa\',\'filterAssigned\')">'+SCAN_ICON+'</button></div>'+
        '<div id="assignedList" class="'+animClass+'"></div>';
      filterAssigned();
      return;

    if(MAIN_TAB === 'reps' && isMgr){
      body.innerHTML = '<div id="repsList" class="'+animClass+'"></div>';

    if(isMgr){
      body.innerHTML =
        '<div class="tabs" id="subTabsBar">'+
          '<button class="tab '+(SUB_TAB==='log'?'active':'')+'" data-tab="log" onclick="switchSub(\'log\')">السجل</button>'+
          '<button class="tab '+(SUB_TAB==='collect'?'active':'')+'" data-tab="collect" onclick="switchSub(\'collect\')">'+
          'التحصيل'+(BALANCES.length?' ('+BALANCES.length+')':'')+'</button>'+
        '</div>'+
        '<div id="subBody" class="'+animClass+'"></div>';
      renderSubBody(0);
    } else {
      body.innerHTML = '<div id="doneList" class="'+animClass+'"></div>';
      const list = document.getElementById('doneList');
      if(!DONE.length){
        list.innerHTML = '<div class="center"><div class="empty-ill">✅</div><b>لسه مفيش حاجة منفّذة</b>هتظهر هنا أول ما تحدّد حالة أي شحنة.</div>';
      } else {
        list.innerHTML = DONE.map(function(x,i){ return card(x, ROLE, false, i); }).join('');
      }

  /* ===== نفس منطق حساب أثر الحالة على التحصيل/العمولة اللي في Code.gs،
     مستخدمة هنا بس لعرض ملخص لكل مندوب من غير ما نضيف نداء سيرفر جديد ===== */
  function moneyEffectJS(status, amount, commission, paidAmt){
    amount = Number(amount)||0; commission = Number(commission)||0; paidAmt = Number(paidAmt)||0;
    switch(status){
      case 'تم التسليم':   return {collected:amount, commission:commission};
      case 'تسليم جزئي':   return {collected:paidAmt, commission:commission};
      case 'رفض و رفض':    return {collected:0, commission:commission};
      case 'رفض و دفع':    return {collected:paidAmt, commission:commission};
      case 'تهرب':         return {collected:0, commission:commission};
      default:             return {collected:0, commission:0};
    }
  }

  function renderRepsTab(container){
    if(!container) return;
    const addBar = '<button class="add-rep-btn" onclick="openAddRep()">＋ إضافة مندوب</button>';
    if(!REPS.length){
      container.innerHTML = addBar +
        '<div class="center"><div class="empty-ill">👥</div><b>لسه مفيش مناديب</b>دوس "إضافة مندوب" فوق عشان تضيف أول واحد.</div>';
      return;
    }
    const all = PENDING.concat(DONE);
    container.innerHTML = addBar + REPS.map(function(rep){
      const items = all.filter(function(x){ return String(x.repId) === String(rep.id); });
      let collected = 0, commission = 0;
      items.forEach(function(x){
        const eff = moneyEffectJS(x.status, x.amount, x.commission, x.paidAmt);
        collected += eff.collected; commission += eff.commission;
      });
      const net = collected - commission;

      let filterOpts = '<option value="all">كل الحالات</option>'+
        '<option value="_pending">قيد التنفيذ</option>';
      Object.keys(STATUS_META).forEach(function(st){
        filterOpts += '<option value="'+esc(st)+'">'+esc(STATUS_META[st].label)+'</option>';
      });

      return '<div class="rep-card">'+
        '<div class="rep-head" onclick="toggleRepDetails(this)"><b>'+esc(rep.name)+'</b><span class="rep-total">'+items.length+' شحنة</span></div>'+
        '<div class="rep-money">'+
          '<span>تحصيل <b>'+collected+' ج</b></span>'+
          '<span>عمولة <b>'+commission+' ج</b></span>'+
          '<span class="net">صافي <b>'+net+' ج</b></span>'+
        '</div>'+
        '<div class="rep-details" hidden data-repid="'+esc(rep.id)+'">'+
          '<select class="filter" onchange="renderRepShipments(this)">'+filterOpts+'</select>'+
          '<div class="rep-ship-list"></div>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  /* ===== إضافة مندوب (أدمن/مسؤول توزيع) =====
     بيضيف صف جديد في شيت Reps مباشرة من التطبيق. الكود اختياري — لو سيبته
     فاضي بيتولّد تلقائي. المندوب الجديد بيبقى دوره "مندوب عادي". */
  function openAddRep(){
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML =
      '<div class="modal-box">'+
        '<p>إضافة مندوب جديد</p>'+
        '<div class="addrep-field"><label>اسم المندوب</label>'+
          '<input id="addRepName" placeholder="مثلاً: أحمد علي"></div>'+
        '<div class="addrep-field"><label>الكود (اختياري)</label>'+
          '<input id="addRepId" inputmode="numeric" placeholder="سيبه فاضي عشان يتولّد تلقائي"></div>'+
        '<div class="modal-actions">'+
          '<button class="cancel" onclick="this.closest(\'.modal-overlay\').remove()">إلغاء</button>'+
          '<button class="confirm" onclick="submitAddRep(this)">✓ إضافة</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(overlay);
    setTimeout(function(){ const i = document.getElementById('addRepName'); if(i) i.focus(); }, 60);
  }

  function submitAddRep(btn){
    const name = (document.getElementById('addRepName').value || '').trim();
    const id = (document.getElementById('addRepId').value || '').trim();
    if(!name){ showToast('اكتب اسم المندوب', 'error'); return; }
    const overlay = btn.closest('.modal-overlay');
    overlay.querySelectorAll('button').forEach(function(b){ b.disabled = true; });
    callServer('addRep', [MY_ID, name, id, MY_PIN]).then(function(res){
      if(res && res.ok){
        overlay.remove();
        showToast('تمت إضافة '+res.name+' (كود: '+res.id+')', 'success');
        load();
      } else {
        overlay.querySelectorAll('button').forEach(function(b){ b.disabled = false; });
        showToast((res && res.error) || 'حصل خطأ', 'error');
      }
    }).catch(function(){
      overlay.querySelectorAll('button').forEach(function(b){ b.disabled = false; });
      showToast('مفيش نت، جرّب تاني', 'error');
    });
  }


  function toggleRepDetails(headEl){
    const card = headEl.closest('.rep-card');
    const d = card ? card.querySelector('.rep-details') : null;
    if(!d) return;
    const wasHidden = d.hidden;
    d.hidden = !d.hidden;
    if(wasHidden){
      const sel = d.querySelector('select.filter');
      renderRepShipmentsFor(d, sel ? sel.value : 'all');
    }
  }

  function renderRepShipments(selectEl){
    const details = selectEl.closest('.rep-details');
    if(details) renderRepShipmentsFor(details, selectEl.value);
  }

  function renderRepShipmentsFor(details, filterVal){
    const repId = details.dataset.repid;
    const all = PENDING.concat(DONE);
    let items = all.filter(function(x){ return String(x.repId) === String(repId); });
    if(filterVal === '_pending') items = items.filter(function(x){ return !x.status || x.status === 'جديد'; });
    else if(filterVal !== 'all') items = items.filter(function(x){ return x.status === filterVal; });
    items = sortByRecency(items);

    const list = details.querySelector('.rep-ship-list');
    if(!list) return;
    if(!items.length){
      list.innerHTML = '<div class="rep-status-row"><span>مفيش شحنات بالحالة دي</span></div>';
      return;
    }
    list.innerHTML = items.map(function(x){
      const isPending = !x.status || x.status === 'جديد';
      const meta = isPending ? {cls:'wait', label:'قيد التنفيذ'} : (STATUS_META[x.status] || {cls:'neutral', label:x.status});
      return '<div class="rep-ship-row">'+
        '<div class="rep-ship-name">'+esc(x.customer)+'<div class="rep-ship-phone mono">'+esc(x.phone||'')+'</div></div>'+
        '<span class="pill '+meta.cls+'">'+meta.label+'</span>'+
      '</div>';
    }).join('');
  }

  function renderSubBody(){
    const sb = document.getElementById('subBody');
    if(!sb) return;
    if(SUB_TAB === 'collect'){
      renderBalances(sb);
    } else {
      let opts = '<option value="all">كل الحالات</option>';
      Object.keys(STATUS_META).forEach(st => opts += '<option value="'+esc(st)+'"'+(STATUS_FILTER===st?' selected':'')+'>'+esc(st)+'</option>');
      sb.innerHTML =
        '<select class="filter" onchange="STATUS_FILTER=this.value; filterDone()">'+opts+'</select>'+
        '<div class="searchRow"><input id="q2" class="search" placeholder="بحث بالاسم أو الموبايل أو الكود" oninput="filterDone()">'+
        '<button type="button" class="scanBtn" onclick="openCameraScan(\'q2\',\'filterDone\')">'+SCAN_ICON+'</button></div>'+
        '<div id="logList"></div>';
      filterDone();
    }
  }

  function renderBalances(container){
    if(!BALANCES.length){
      container.innerHTML = '<div class="center"><div class="empty-ill">👌</div><b>كله مقفول</b>مفيش حد عليه فلوس لسه.</div>';
      return;
    }
    container.innerHTML = BALANCES.map(b =>
      '<div class="bal-card"><div class="bal-info"><b>'+esc(b.repName)+'</b>'+
      '<span>'+b.count+' شحنة لسه متحصّلة</span>'+
      '<span class="amt">'+b.net+' ج</span></div>'+
      '<button class="close-btn" onclick="closeAccount(this,\''+esc(b.repId)+'\',\''+esc(b.repName)+'\')">'+
      'قفل الحساب</button></div>').join('');
  }

  function closeAccount(btn, repId, repName){
    showConfirm('تأكيد استلام الكاش من '+repName+'؟\nهيتقفل الحساب ومش هترجع تعدّله.')
      .then(function(ok){
        if(!ok) return;
        btn.disabled = true; btn.textContent = 'جارِ القفل…';
        callServer('closeRepAccount', [MY_ID, repId, MY_PIN])
          .then(function(r){
            if(r.ok){
              showToast('تم ✅ '+r.repName+' — '+r.count+' شحنة — '+r.amount+' ج', 'success');
              load();
            } else { showToast(r.error, 'error'); btn.disabled = false; btn.textContent = 'قفل الحساب'; }
          })
          .catch(function(e){
            showToast('خطأ: '+e.message, 'error');
            btn.disabled = false; btn.textContent = 'قفل الحساب';
          });
      });
